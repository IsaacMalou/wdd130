<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <header>
        <h1>HTML and CSS Fundamentals Quiz</h1>
    </header>
    <main>
        <form>
            <!-- Question 1: Fill in the blank -->
            <div class="form-item">
                <label for="q1">1. What does the "H" in HTML stand for?</label>
                <input type="text" id="q1" name="q1" required>
            </div>

            <!-- Question 2: Short Answer -->
            <div class="form-item">
                <label for="q2">2. Explain the purpose of the &lt;head&gt; element:</label>
                <textarea id="q2" name="q2" rows="3"
                  placeholder="Type your answer here..."></textarea>
            </div>

            <!-- Question 3: Dropdown -->
            <div class="form-item">
                <label for="q3">3. Which property is used to change background color?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="color">color</option>
                    <option value="bgcolor">bgcolor</option>
                    <option value="background-color">background-color</option>
                </select>
            </div>

            <!-- Question 4: Integer Answer -->
            <div class="form-item">
                <label for="q4">4. How many levels of headings (h1-h6) are in HTML?</label>
                <input type="number" id="q4" name="q4" min="0">
            </div>

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 | HTML & CSS Quiz | Isaac Malou</p>
    </footer>
</body>

</html>
