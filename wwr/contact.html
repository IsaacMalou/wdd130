<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | White Water Rafting Company</title>
  <meta name="description"
    content="Contact White Water Rafting Company for bookings, questions, and adventure inquiries.">
  <meta name="author" content="Isaac Malou">
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
  <header>
    <img src="images/logo.png" alt="White Water Rafting Company Logo">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>White Water Rafting Company</h1>

    <section class="company-details">
      <p>123 Main River Street, Juba, Central Equatoria State</p>
      <p>Phone: +1 999 999 9999 | Email: info@whitewater.com</p>
    </section>

    <div class="contact-layout">
      <section class="company-info">
        <iframe src="https://satellites.pro/Google_plan/Juba_map.South_Sudan"></iframe>
      </section>

      <section class="contact-form">
        <form action="#" method="post">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>

          <p>Message Purpose</p>
          <div class="radio-group">
            <label for="general"><input type="radio" id="general" name="purpose" value="general">
              General Inquiry</label>
            <label for="booking"><input type="radio" id="booking" name="purpose" value="booking">
              Reservation Question</label>
            <label for="feedback"><input type="radio" id="feedback" name="purpose" value="feedback">
              Website Suggestion</label>
          </div>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="4"></textarea>

          <div class="checkbox-group">
            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Please subscribe me to the monthly newsletter</label>
          </div>

          <button type="submit">Get in Touch!</button>
        </form>
      </section>
    </div>

    <section class="employees">
      <h2>We Are Here to Serve You</h2>
      <div class="employees-container">
        <figure>
          <img src="images/employee1.png" alt="John - Professional Rafting Guide">
          <figcaption>John - Guide</figcaption>
        </figure>
        <figure>
          <img src="images/employee2.png" alt="Sarah - Customer Support Representative">
          <figcaption>Sarah - Support</figcaption>
        </figure>
        <figure>
          <img src="images/employee3.png" alt="David - Rafting Safety Expert">
          <figcaption>David - Safety Expert</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 White Water Rafting Company | Isaac Malou</p>
    <nav class="socialmedia">
      <a href="https://facebook.com"><img src="images/facebook.png" alt="Follow us on Facebook"></a>
      <a href="https://twitter.com"><img src="images/x-social-icon.png"
          alt="Follow us on X/Twitter"></a>
      <a href="https://instagram.com"><img src="images/instagram.png"
          alt="Follow us on Instagram"></a>
    </nav>
  </footer>
</body>

</html>
