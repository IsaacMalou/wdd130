<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | White Water Rafting Company</title>
  <meta name="description"
    content="Contact White Water Rafting Company for bookings, questions, and adventure inquiries.">
  <meta name="author" content="Isaac Chol Aguer">

  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

  <header>
    <img src="images/logo.png" alt="Rafting Company Logo">

    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <h1>Contact Us</h1>

    <!-- COMPANY INFO -->
    <section class="contact-info">
      <h2>Company Information</h2>
      <p><strong>Address:</strong> Juba, South Sudan</p>
      <p><strong>Phone:</strong> +211 900 000 000</p>
      <p><strong>Email:</strong> info@rafting.com</p>

      <iframe src="https://maps.google.com/maps?q=Juba%20South%20Sudan&output=embed"></iframe>
    </section>

    <!-- EMPLOYEES -->
    <section class="employees">
      <h2>Meet Our Team</h2>

      <figure>
        <img src="images/employee1.png" alt="John guide rafting instructor">
        <figcaption>John – Lead Guide</figcaption>
      </figure>

      <figure>
        <img src="images/employee2.png" alt="Sarah customer support agent">
        <figcaption>Sarah – Customer Support</figcaption>
      </figure>

      <figure>
        <img src="images/employee3.png" alt="David rafting safety expert">
        <figcaption>David – Safety Expert</figcaption>
      </figure>

    </section>

    <!-- CONTACT FORM -->
    <section class="contact-form">
      <h2>Send Us a Message</h2>

      <form>
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <p>Purpose of Message:</p>

        <label><input type="radio" name="purpose" value="general"> General Inquiry</label>
        <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
        <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4"></textarea>

        <label>
          <input type="checkbox" name="subscribe">
          Please subscribe me to the monthly newsletter
        </label>

        <button type="submit">Send Message</button>
      </form>
    </section>

  </main>

  <footer>
    <p>© 2026 White Water Rafting Company | Isaac Chol Aguer</p>

    <nav class="socialmedia">
      <a href="#"><img src="images/facebook.png" alt="Visit our Facebook page"></a>
      <a href="#"><img src="images/x-social-icon.png" alt="Visit our X (twitter) page"></a>
      <a href="#"><img src="images/instagram.png" alt="Visit our Instagram page"></a>
    </nav>
  </footer>

</body>

</html>
