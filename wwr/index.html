<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | White Water Rafting Company</title>
    <meta name="description"
      content="Experience thrilling white water rafting adventures, scenic tours, and unforgettable outdoor trips.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="White Water Rafting Company Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- HERO -->
        <section class="hero">
            <img src="images/hero.jpg" alt="White water rafting adventure" class="hero-img">
            <div class="hero-msg">
                <h1>Have an Adventure</h1>
                <p>Make Memories with White Water Rafting</p>
                <a href="trips.html" class="book-btn">Book Now</a>
            </div>
        </section>

        <!-- NEWSLETTER -->
        <section class="newsletter">
            <h2>Sign up for our Newsletter</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <button type="submit">Join the Adventure</button>
            </form>
        </section>

        <!-- GRID -->
        <section class="home-grid">
            <div class="feature-item">
                <img src="images/rivers.jpg" alt="Scenic rivers">
                <h3>Rivers</h3>
            </div>
            <div class="feature-item">
                <img src="images/camping.jpeg" alt="Camping by the river">
                <h3>Camping</h3>
            </div>
            <div class="feature-item">
                <img src="images/rapids.jpg" alt="Exciting rapids">
                <h3>Rapids</h3>
            </div>
        </section>

        <!-- CTA -->
        <section class="home-cta">
            <img src="images/mountains.jpg" alt="Mountain scenery" class="cta-img">
            <div class="cta-box">
                <h2>More Than Just The Thrill</h2>
                <p>Enjoy breathtaking scenery beyond the rapids.</p>
                <a href="trips.html" class="join-btn">Join Us</a>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Company | Isaac Malou</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/x-social-icon.png" alt="X"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>
    </footer>
</body>

</html>
