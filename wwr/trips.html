<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips | White Water Rafting Company</title>
    <meta name="description"
      content="Explore our rafting trips including beginner, intermediate, and advanced adventures.">
    <meta name="author" content="Isaac Malou">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="White Water Rafting Company Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Our Adventure Packages</h1>

        <div class="trips-grid">
            <section class="trip-list">
                <figure>
                    <img src="images/raft3.jpg" alt="Half day rafting trip">
                    <figcaption><strong>Half Day Adventure:</strong> Perfect for beginners.
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/raft4.jpg" alt="Rapid rafting experience">
                    <figcaption><strong>Rapid Rush:</strong> Class III rapids.</figcaption>
                </figure>

                <figure>
                    <img src="images/raft5.jpg" alt="Wild river rafting">
                    <figcaption><strong>Wild River:</strong> Full-day challenge.</figcaption>
                </figure>
            </section>

            <section class="trip-sidebar">
                <h2>Trip Summary</h2>

                <table>
                    <thead>
                        <tr>
                            <th>Trip</th>
                            <th>Duration</th>
                            <th>Level</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Half Day</td>
                            <td>3 Hours</td>
                            <td>Easy</td>
                        </tr>
                        <tr>
                            <td>Rapid Rush</td>
                            <td>5 Hours</td>
                            <td>Moderate</td>
                        </tr>
                        <tr>
                            <td>Wild River</td>
                            <td>8 Hours</td>
                            <td>Hard</td>
                        </tr>
                    </tbody>
                </table>

                <a href="contact.html" class="cta-button">Contact Us to Book</a>
            </section>
        </div>
    </main>

    <footer>
        <p>© 2026 White Water Rafting Company | Isaac Malou</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/x-social-icon.png" alt="X"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>
    </footer>
</body>

</html>
